<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1100" viewBox="0 0 900 1100" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sheen" cx="34%" cy="16%" r="100%">
      <stop offset="0%" stop-color="#fcfbf7"></stop>
      <stop offset="55%" stop-color="#f5f3eb"></stop>
      <stop offset="100%" stop-color="#ebe8dd"></stop>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cdb787" stop-opacity="0"></stop>
      <stop offset="70%" stop-color="#cdb787" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#c4ad79" stop-opacity="0.4"></stop>
    </linearGradient>

    
    <filter id="veins" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.0024 0.009" numOctaves="3" seed="14" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="luminanceToAlpha" result="lum"></feColorMatrix>
      <feComponentTransfer in="lum" result="band">
        <feFuncA type="table" tableValues="0 0 0 .15 .9 .15 0 0 0"></feFuncA>
      </feComponentTransfer>
      <feFlood flood-color="#938b7b" result="vcol"></feFlood>
      <feComposite in="vcol" in2="band" operator="in" result="veins"></feComposite>
      <feGaussianBlur in="veins" stdDeviation="0.7"></feGaussianBlur>
    </filter>

    
    <filter id="veins2" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.0015 0.0035" numOctaves="2" seed="6" stitchTiles="stitch" result="n"></feTurbulence>
      <feColorMatrix in="n" type="luminanceToAlpha" result="lum"></feColorMatrix>
      <feComponentTransfer in="lum" result="band">
        <feFuncA type="table" tableValues="0 .12 .4 .12 0"></feFuncA>
      </feComponentTransfer>
      <feFlood flood-color="#d2cbba" result="vcol"></feFlood>
      <feComposite in="vcol" in2="band" operator="in" result="veins"></feComposite>
      <feGaussianBlur in="veins" stdDeviation="4"></feGaussianBlur>
    </filter>
  </defs>

  <rect width="900" height="1100" fill="url(#sheen)"></rect>
  <rect width="900" height="1100" filter="url(#veins2)" opacity="0.6"></rect>
  <rect width="900" height="1100" filter="url(#veins)" opacity="0.4"></rect>
  <rect width="900" height="1100" fill="url(#gold)" opacity="0.5"></rect>
</svg>